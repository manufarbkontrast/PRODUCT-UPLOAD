<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-labelledby="t2-sohle-title">
  <title id="t2-sohle-title">Sohle: Schuh umlegen, Sohle zeigt zur Kamera</title>

  <!-- Dreh-Pfeil: Schuh wird umgelegt -->
  <g stroke="#818cf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M40,26 A26,26 0 1 1 16,52"/>
    <path d="M24,44 L16,52 L10,40"/>
  </g>

  <!-- Sohle (Ansicht von unten, zeigt zur Kamera) -->
  <g transform="translate(35,34.5) scale(0.7)" fill="#6b7280" fill-opacity="0.08" stroke="#6b7280" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M35,4 C50,4 60,18 62,36 C64,54 60,70 54,84 C50,94 46,102 44,112 C43,120 40,126 35,128 C30,126 27,120 26,112 C24,102 20,94 16,84 C10,70 6,54 8,36 C10,18 20,4 35,4 Z"/>
    <line x1="14" y1="50" x2="56" y2="50" stroke-width="3"/>
    <line x1="12" y1="70" x2="58" y2="70" stroke-width="3"/>
    <line x1="16" y1="95" x2="54" y2="95" stroke-width="3"/>
  </g>

  <!-- Gestrichelte Linie: Sohle zeigt zur Kamera -->
  <line x1="97" y1="80" x2="172" y2="80" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="5 5"/>

  <!-- Kamera-Symbol -->
  <g transform="translate(175,58.5)" fill="none" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="8" width="40" height="27" rx="5"/>
    <rect x="12" y="0" width="14" height="8" rx="2"/>
    <circle cx="20" cy="21.5" r="8.5"/>
    <circle cx="20" cy="21.5" r="3" fill="#6b7280" stroke="none"/>
  </g>
</svg>
