<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" role="img" aria-labelledby="t3-schraeg-title">
  <title id="t3-schraeg-title">Schräg von vorne: Schuh aufstellen und leicht zur Kamera drehen (3/4-Ansicht)</title>

  <!-- Tischkante -->
  <path d="M10,120 L230,120 L221,130 L19,130 Z" fill="#6b7280" fill-opacity="0.12" stroke="none"/>
  <line x1="10" y1="120" x2="230" y2="120" stroke="#6b7280" stroke-width="3" stroke-linecap="round"/>

  <!-- Schuh (leicht gedreht Richtung Kamera, 3/4-Ansicht) -->
  <g transform="translate(24,68.3) scale(0.46,0.55) skewX(-16)" fill="#6b7280" fill-opacity="0.08" stroke="#6b7280" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M12,94 C8,86 9,76 16,68 C26,56 42,46 62,39 C86,31 112,27 136,26 C142,26 146,29 150,33 C156,30 164,27 172,27 C182,27 191,33 196,44 C200,53 200,63 197,73 C195,81 190,88 182,94 L182,94 L12,94 Z"/>
    <path d="M14,88 C40,90 90,91 140,90 C160,89.5 175,88.5 184,86" fill="none" stroke-width="3.4"/>
  </g>

  <!-- Dreh-Pfeil: leicht zur Kamera drehen -->
  <g stroke="#818cf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M55,30 A34,16 0 0 1 108,22"/>
    <path d="M98,16 L108,22 L100,31"/>
  </g>

  <!-- Gestrichelte Linie: Kamera schaut leicht schräg auf den Schuh -->
  <line x1="118" y1="96" x2="170" y2="88" stroke="#818cf8" stroke-width="2.5" stroke-dasharray="5 5"/>

  <!-- Kamera-Symbol -->
  <g transform="translate(175,72.5)" fill="none" stroke="#6b7280" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="8" width="40" height="27" rx="5"/>
    <rect x="12" y="0" width="14" height="8" rx="2"/>
    <circle cx="20" cy="21.5" r="8.5"/>
    <circle cx="20" cy="21.5" r="3" fill="#6b7280" stroke="none"/>
  </g>
</svg>
